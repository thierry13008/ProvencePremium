<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#8b7355" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://i.ibb.co/b4NRhjc/logo-provence-cp.png" />
    <title>Provence Premium - Visites Guidées</title>
  </head>
  <body>
    <script>
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW Registered!', reg))
            .catch(err => console.log('SW Registration failed!', err));
        });
      }
      
      // Language Router
      (function() {
        const userLang = navigator.language || navigator.userLanguage;
        const lang = userLang.startsWith('ru') ? 'ru' : userLang.startsWith('fr') ? 'fr' : 'en';
        
        // Only redirect if at the root
        if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
          window.location.href = '/' + lang + '/';
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
